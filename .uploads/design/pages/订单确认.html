<!DOCTYPE html>
<html lang="zh-CN" class="light" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>确认订单</title>
    <style id="theme-vars">
/* Family Menu - iOS-inspired Minimalist White Theme */
:root {
  /* Brand Colors */
  --color-primary: #FF6B35;
  --color-primary-hover: #E85A25;
  --color-primary-light: #FFF0EB;
  --color-primary-subtle: #FFF5F0;

  /* Neutrals - iOS System Gray Scale */
  --color-bg-primary: #FFFFFF;
  --color-bg-secondary: #F2F2F7;
  --color-bg-tertiary: #E5E5EA;
  --color-bg-elevated: #FFFFFF;

  /* Text Colors */
  --color-text-primary: #1C1C1E;
  --color-text-secondary: #8E8E93;
  --color-text-tertiary: #AEAEB2;
  --color-text-inverse: #FFFFFF;

  /* Semantic State Colors */
  --state-success: #34C759;
  --state-success-bg: #E8F9ED;
  --state-warning: #FF9F0A;
  --state-warning-bg: #FFF6E0;
  --state-error: #FF3B30;
  --state-error-bg: #FFE8E7;
  --state-info: #007AFF;
  --state-info-bg: #E5F1FF;

  /* Border & Divider */
  --color-border: rgba(0, 0, 0, 0.06);
  --color-border-strong: rgba(0, 0, 0, 0.12);
  --color-divider: rgba(60, 60, 67, 0.08);

  /* Shadows - iOS style subtle elevation */
  --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.04);
  --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.06);
  --shadow-lg: 0 12px 32px rgba(0, 0, 0, 0.10);
  --shadow-float: 0 16px 48px rgba(0, 0, 0, 0.12);

  /* Radius Scale - iOS style rounded corners */
  --radius-xs: 4px;
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-xl: 20px;
  --radius-full: 9999px;

  /* Spacing Scale */
  --spacing-xs: 4px;
  --spacing-sm: 8px;
  --spacing-md: 12px;
  --spacing-lg: 16px;
  --spacing-xl: 20px;
  --spacing-2xl: 24px;
  --spacing-3xl: 32px;
  --spacing-4xl: 40px;

  /* Typography - SF Pro inspired */
  --font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  --font-family-display: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  --font-family-body: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'PingFang SC', 'Microsoft YaHei', sans-serif;

  /* Type Scale */
  --text-xs: 11px;
  --text-xs-lh: 1.36;
  --text-sm: 13px;
  --text-sm-lh: 1.38;
  --text-base: 15px;
  --text-base-lh: 1.47;
  --text-md: 17px;
  --text-md-lh: 1.41;
  --text-lg: 20px;
  --text-lg-lh: 1.4;
  --text-xl: 24px;
  --text-xl-lh: 1.33;
  --text-2xl: 28px;
  --text-2xl-lh: 1.29;
  --text-3xl: 34px;
  --text-3xl-lh: 1.24;

  /* Font Weights */
  --weight-regular: 400;
  --weight-medium: 500;
  --weight-semibold: 600;
  --weight-bold: 700;

  /* Component Dimensions */
  --control-height-sm: 32px;
  --control-height-md: 36px;
  --control-height-lg: 44px;
  --control-height-xl: 50px;

  /* Mini Program Nav Bar */
  --nav-bar-height: 44px;
  --status-bar-height: 20px;
  --tab-bar-height: 49px;
  --safe-area-bottom: 34px;
}

/* Typography Classes */
.typography-display {
  font-family: var(--font-family-display);
  font-weight: var(--weight-bold);
  letter-spacing: -0.02em;
}

.typography-title-1 {
  font-family: var(--font-family-display);
  font-size: var(--text-3xl);
  font-weight: var(--weight-bold);
  letter-spacing: -0.02em;
  line-height: var(--text-3xl-lh);
  color: var(--color-text-primary);
}

.typography-title-2 {
  font-family: var(--font-family-display);
  font-size: var(--text-2xl);
  font-weight: var(--weight-bold);
  letter-spacing: -0.01em;
  line-height: var(--text-2xl-lh);
  color: var(--color-text-primary);
}

.typography-title-3 {
  font-family: var(--font-family-display);
  font-size: var(--text-xl);
  font-weight: var(--weight-semibold);
  letter-spacing: -0.01em;
  line-height: var(--text-xl-lh);
  color: var(--color-text-primary);
}

.typography-headline {
  font-family: var(--font-family-body);
  font-size: var(--text-md);
  font-weight: var(--weight-semibold);
  line-height: var(--text-md-lh);
  color: var(--color-text-primary);
}

.typography-body {
  font-family: var(--font-family-body);
  font-size: var(--text-base);
  font-weight: var(--weight-regular);
  line-height: var(--text-base-lh);
  color: var(--color-text-primary);
}

.typography-callout {
  font-family: var(--font-family-body);
  font-size: var(--text-sm);
  font-weight: var(--weight-regular);
  line-height: var(--text-sm-lh);
  color: var(--color-text-secondary);
}

.typography-caption {
  font-family: var(--font-family-body);
  font-size: var(--text-xs);
  font-weight: var(--weight-regular);
  line-height: var(--text-xs-lh);
  color: var(--color-text-tertiary);
}

.typography-price {
  font-family: var(--font-family-display);
  font-weight: var(--weight-bold);
  color: var(--color-primary);
}

/* iOS-style Card Surface */
.surface-card {
  background: var(--color-bg-elevated);
  border-radius: var(--radius-md);
  box-shadow: var(--shadow-sm);
}

/* iOS-style List Group */
.surface-grouped {
  background: var(--color-bg-elevated);
  border-radius: var(--radius-md);
  overflow: hidden;
}

/* iOS-style Floating Panel */
.surface-float {
  background: var(--color-bg-elevated);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-float);
}

    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  @theme inline {
    --color-primary: var(--color-primary);
    --color-border: var(--color-border);
  }
  @layer base {
    body { background: var(--color-bg-primary); color: var(--color-text-primary); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }
    </style>
</head>
<body class="min-h-screen font-sans antialiased">
    <main>
      <!-- Status Bar Spacer -->
      <div class="h-[20px]"></div>

      <!-- Nav Bar -->
      <header class="sticky top-0 z-30 border-b border-[var(--color-divider)]" style="background:var(--color-bg-primary);">
        <div class="flex h-[44px] items-center px-4">
          <!-- Left: Back -->
          <div class="flex w-[88px] items-center justify-start">
            <button data-dom-id="back-to-cart" class="inline-flex h-8 w-8 items-center justify-center rounded-lg" style="border:1px solid var(--color-border); background:var(--color-bg-primary);" aria-label="返回购物车">
              <i data-lucide="chevron-left" class="h-4 w-4" style="color:var(--color-text-primary);"></i>
            </button>
          </div>
          <!-- Center: Title -->
          <div class="min-w-0 flex-1 text-center" style="font-size:17px; font-weight:600; color:var(--color-text-primary); letter-spacing:-0.02em; line-height:1.41;">确认订单</div>
          <!-- Right: Capsule -->
          <div class="flex h-8 w-[88px] items-center justify-center" style="margin-right: var(--spacing-lg); border-radius: var(--radius-full); background: var(--color-bg-secondary); border: 1px solid var(--color-border);">
            <button class="flex h-full flex-1 items-center justify-center" aria-label="更多">
              <i data-lucide="more-horizontal" class="h-4 w-4" style="color: var(--color-text-secondary);"></i>
            </button>
            <span class="h-4 w-px" style="background: var(--color-border);" aria-hidden="true"></span>
            <button class="flex h-full flex-1 items-center justify-center" aria-label="关闭">
              <i data-lucide="x" class="h-4 w-4" style="color: var(--color-text-secondary);"></i>
            </button>
          </div>
        </div>
      </header>

      <!-- Scrollable Content Area -->
      <div class="pb-[100px]">

        <!-- Section 1: Diner Info (who is eating) -->
        <section class="mx-4 mt-4" style="background:var(--color-bg-elevated); border-radius:var(--radius-md); box-shadow:var(--shadow-sm); overflow:hidden;">
          <div class="flex items-stretch">
            <!-- Orange Left Accent -->
            <div class="w-[3px] shrink-0 self-stretch" style="background:var(--color-primary); border-radius:0 2px 2px 0;"></div>
            <!-- Diner Content -->
            <div class="flex min-w-0 flex-1 items-center gap-3 px-4 py-3">
              <!-- User Icon -->
              <i data-lucide="user" class="h-5 w-5 shrink-0" style="color:var(--color-primary);"></i>
              <!-- Diner Info -->
              <div class="min-w-0 flex-1">
                <div class="flex items-baseline gap-2">
                  <span class="truncate" style="font-size:var(--text-md); font-weight:var(--weight-semibold); color:var(--color-text-primary);">张三</span>
                  <span class="shrink-0 truncate" style="font-size:var(--text-sm); color:var(--color-text-secondary);">下单给全家</span>
                </div>
                <p class="mt-1 truncate" style="font-size:var(--text-sm); color:var(--color-text-secondary); line-height:var(--text-sm-lh);">共 3 人用餐</p>
              </div>
              <!-- Right Chevron -->
              <i data-lucide="chevron-right" class="h-4 w-4 shrink-0" style="color:var(--color-text-tertiary);" aria-label="修改用餐人"></i>
            </div>
          </div>
        </section>

        <!-- Section 2: Order Items -->
        <section class="mx-4 mt-3" style="background:var(--color-bg-elevated); border-radius:var(--radius-md); box-shadow:var(--shadow-sm);">
          <!-- Header -->
          <div class="flex items-center justify-between px-4 pt-3 pb-2">
            <span style="font-size:var(--text-md); font-weight:var(--weight-semibold); color:var(--color-text-primary);">订单明细</span>
            <span style="font-size:var(--text-sm); color:var(--color-text-secondary);">(3件)</span>
          </div>
          <!-- Item 1 -->
          <div class="flex items-center justify-between px-4 py-3" style="border-top:1px solid var(--color-divider);">
            <span class="truncate" style="font-size:var(--text-base); color:var(--color-text-primary);">红烧肉</span>
            <div class="flex shrink-0 items-center gap-3">
              <span style="font-size:var(--text-sm); color:var(--color-text-secondary);">x2</span>
              <span class="typography-price" style="font-size:var(--text-base);">&yen;76</span>
            </div>
          </div>
          <!-- Item 2 -->
          <div class="flex items-center justify-between px-4 py-3" style="border-top:1px solid var(--color-divider);">
            <span class="truncate" style="font-size:var(--text-base); color:var(--color-text-primary);">西红柿炒蛋</span>
            <div class="flex shrink-0 items-center gap-3">
              <span style="font-size:var(--text-sm); color:var(--color-text-secondary);">x1</span>
              <span class="typography-price" style="font-size:var(--text-base);">&yen;18</span>
            </div>
          </div>
          <!-- Item 3 -->
          <div class="flex items-center justify-between px-4 py-3" style="border-top:1px solid var(--color-divider);">
            <span class="truncate" style="font-size:var(--text-base); color:var(--color-text-primary);">蛋炒饭</span>
            <div class="flex shrink-0 items-center gap-3">
              <span style="font-size:var(--text-sm); color:var(--color-text-secondary);">x1</span>
              <span class="typography-price" style="font-size:var(--text-base);">&yen;15</span>
            </div>
          </div>
        </section>

        <!-- Section 3: Remarks -->
        <section class="mx-4 mt-3" style="background:var(--color-bg-elevated); border-radius:var(--radius-md); box-shadow:var(--shadow-sm);">
          <div class="px-4 pt-3 pb-2">
            <span style="font-size:var(--text-md); font-weight:var(--weight-semibold); color:var(--color-text-primary);">备注信息</span>
          </div>
          <div class="px-4 pb-3">
            <textarea rows="2" placeholder="请输入特殊要求（如：少辣、不要香菜等）" class="w-full resize-none" style="font-family:var(--font-family-body); font-size:var(--text-base); color:var(--color-text-primary); line-height:var(--text-base-lh); background:var(--color-bg-secondary); border:1px solid var(--color-border); border-radius:var(--radius-sm); padding:var(--spacing-md); outline:none;"></textarea>
          </div>
        </section>

        <!-- Section 4: Price Summary -->
        <section class="mx-4 mt-3" style="background:var(--color-bg-elevated); border-radius:var(--radius-md); box-shadow:var(--shadow-sm);">
          <div class="flex items-center justify-between px-4 py-3">
            <span style="font-size:var(--text-base); color:var(--color-text-secondary);">菜品小计</span>
            <span style="font-size:var(--text-base); color:var(--color-text-primary);">&yen;109</span>
          </div>
          <!-- Total -->
          <div class="flex items-center justify-end gap-2 px-4 py-3">
            <span style="font-size:var(--text-md); color:var(--color-text-primary);">合计：</span>
            <span class="typography-price" style="font-size:var(--text-xl);">&yen;109</span>
          </div>
        </section>

      </div>

      <!-- Fixed Bottom Submit Bar -->
      <div class="fixed bottom-0 left-0 right-0 z-40 flex items-center justify-between px-4" style="background:var(--color-bg-primary); box-shadow:var(--shadow-lg); height:[calc(50px+env(safe-area-inset-bottom,0px))]; padding-bottom:env(safe-area-inset-bottom,0px);">
        <div class="flex items-baseline gap-1">
          <span style="font-size:var(--text-sm); color:var(--color-text-secondary);">合计</span>
          <span class="typography-price" style="font-size:var(--text-lg);">&yen;109</span>
        </div>
        <button data-dom-id="submit-order" class="shrink-0" style="background:var(--color-primary); color:var(--color-text-inverse); font-size:var(--text-md); font-weight:var(--weight-semibold); height:50px; padding:0 32px; border:none; border-radius:var(--radius-md); cursor:pointer; font-family:var(--font-family-body); transition:opacity 120ms cubic-bezier(.2,.8,.2,1);">
          提交订单给家人
        </button>
      </div>

      <!-- Custom styles for micro-interactions -->
      <style>
        @media (prefers-reduced-motion: reduce) {
          * { transition-duration: 0.01ms !important; }
        }
        button[data-dom-id="submit-order"]:active {
          opacity: 0.85;
        }
        button[data-dom-id="back-to-cart"]:active {
          opacity: 0.7;
        }
        textarea:focus {
          border-color: var(--color-primary);
        }
      </style>
    </main>
    <script>lucide.createIcons();</script>
</body>
</html>
