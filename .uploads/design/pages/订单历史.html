<!DOCTYPE html>
<html lang="zh-CN" class="light" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>订单历史</title>
    <style id="theme-vars">
/* Family Menu - iOS-inspired Minimalist White Theme */
:root {
  /* Brand Colors */
  --color-primary: #FF6B35;
  --color-primary-hover: #E85A25;
  --color-primary-light: #FFF0EB;
  --color-primary-subtle: #FFF5F0;

  /* Neutrals - iOS System Gray Scale */
  --color-bg-primary: #FFFFFF;
  --color-bg-secondary: #F2F2F7;
  --color-bg-tertiary: #E5E5EA;
  --color-bg-elevated: #FFFFFF;

  /* Text Colors */
  --color-text-primary: #1C1C1E;
  --color-text-secondary: #8E8E93;
  --color-text-tertiary: #AEAEB2;
  --color-text-inverse: #FFFFFF;

  /* Semantic State Colors */
  --state-success: #34C759;
  --state-success-bg: #E8F9ED;
  --state-warning: #FF9F0A;
  --state-warning-bg: #FFF6E0;
  --state-error: #FF3B30;
  --state-error-bg: #FFE8E7;
  --state-info: #007AFF;
  --state-info-bg: #E5F1FF;

  /* Border & Divider */
  --color-border: rgba(0, 0, 0, 0.06);
  --color-border-strong: rgba(0, 0, 0, 0.12);
  --color-divider: rgba(60, 60, 67, 0.08);

  /* Shadows - iOS style subtle elevation */
  --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.04);
  --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.06);
  --shadow-lg: 0 12px 32px rgba(0, 0, 0, 0.10);
  --shadow-float: 0 16px 48px rgba(0, 0, 0, 0.12);

  /* Radius Scale - iOS style rounded corners */
  --radius-xs: 4px;
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-xl: 20px;
  --radius-full: 9999px;

  /* Spacing Scale */
  --spacing-xs: 4px;
  --spacing-sm: 8px;
  --spacing-md: 12px;
  --spacing-lg: 16px;
  --spacing-xl: 20px;
  --spacing-2xl: 24px;
  --spacing-3xl: 32px;
  --spacing-4xl: 40px;

  /* Typography - SF Pro inspired */
  --font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  --font-family-display: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  --font-family-body: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'PingFang SC', 'Microsoft YaHei', sans-serif;

  /* Type Scale */
  --text-xs: 11px;
  --text-xs-lh: 1.36;
  --text-sm: 13px;
  --text-sm-lh: 1.38;
  --text-base: 15px;
  --text-base-lh: 1.47;
  --text-md: 17px;
  --text-md-lh: 1.41;
  --text-lg: 20px;
  --text-lg-lh: 1.4;
  --text-xl: 24px;
  --text-xl-lh: 1.33;
  --text-2xl: 28px;
  --text-2xl-lh: 1.29;
  --text-3xl: 34px;
  --text-3xl-lh: 1.24;

  /* Font Weights */
  --weight-regular: 400;
  --weight-medium: 500;
  --weight-semibold: 600;
  --weight-bold: 700;

  /* Component Dimensions */
  --control-height-sm: 32px;
  --control-height-md: 36px;
  --control-height-lg: 44px;
  --control-height-xl: 50px;

  /* Mini Program Nav Bar */
  --nav-bar-height: 44px;
  --status-bar-height: 20px;
  --tab-bar-height: 49px;
  --safe-area-bottom: 34px;
}

/* Typography Classes */
.typography-display {
  font-family: var(--font-family-display);
  font-weight: var(--weight-bold);
  letter-spacing: -0.02em;
}

.typography-title-1 {
  font-family: var(--font-family-display);
  font-size: var(--text-3xl);
  font-weight: var(--weight-bold);
  letter-spacing: -0.02em;
  line-height: var(--text-3xl-lh);
  color: var(--color-text-primary);
}

.typography-title-2 {
  font-family: var(--font-family-display);
  font-size: var(--text-2xl);
  font-weight: var(--weight-bold);
  letter-spacing: -0.01em;
  line-height: var(--text-2xl-lh);
  color: var(--color-text-primary);
}

.typography-title-3 {
  font-family: var(--font-family-display);
  font-size: var(--text-xl);
  font-weight: var(--weight-semibold);
  letter-spacing: -0.01em;
  line-height: var(--text-xl-lh);
  color: var(--color-text-primary);
}

.typography-headline {
  font-family: var(--font-family-body);
  font-size: var(--text-md);
  font-weight: var(--weight-semibold);
  line-height: var(--text-md-lh);
  color: var(--color-text-primary);
}

.typography-body {
  font-family: var(--font-family-body);
  font-size: var(--text-base);
  font-weight: var(--weight-regular);
  line-height: var(--text-base-lh);
  color: var(--color-text-primary);
}

.typography-callout {
  font-family: var(--font-family-body);
  font-size: var(--text-sm);
  font-weight: var(--weight-regular);
  line-height: var(--text-sm-lh);
  color: var(--color-text-secondary);
}

.typography-caption {
  font-family: var(--font-family-body);
  font-size: var(--text-xs);
  font-weight: var(--weight-regular);
  line-height: var(--text-xs-lh);
  color: var(--color-text-tertiary);
}

.typography-price {
  font-family: var(--font-family-display);
  font-weight: var(--weight-bold);
  color: var(--color-primary);
}

/* iOS-style Card Surface */
.surface-card {
  background: var(--color-bg-elevated);
  border-radius: var(--radius-md);
  box-shadow: var(--shadow-sm);
}

/* iOS-style List Group */
.surface-grouped {
  background: var(--color-bg-elevated);
  border-radius: var(--radius-md);
  overflow: hidden;
}

/* iOS-style Floating Panel */
.surface-float {
  background: var(--color-bg-elevated);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-float);
}

    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  @theme inline {
    --color-primary: var(--color-primary);
    --color-border: var(--color-border);
  }
  @layer base {
    body { background: var(--color-bg-primary); color: var(--color-text-primary); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }
    </style>
</head>
<body class="min-h-screen font-sans antialiased">
    <main class="pb-[133px]" style="background:var(--color-bg-secondary); min-height:100vh;">

      <!-- Status Bar Spacer -->
      <div class="h-11" aria-hidden="true"></div>

      <!-- Nav Bar -->
      <header class="sticky top-0 z-30" style="background:var(--color-bg-primary); border-bottom:1px solid var(--color-divider);">
        <div class="flex items-center" style="height:var(--nav-bar-height); padding:0;">
          <!-- Left: Back -->
          <div class="flex w-[88px] items-center justify-start" style="padding-left:var(--spacing-lg);">
            <button data-dom-id="back-to-list" class="inline-flex items-center justify-center" style="width:32px; height:32px; border-radius:var(--radius-sm);" aria-label="返回">
              <i data-lucide="chevron-left" class="h-5 w-5" style="color:var(--color-text-primary);"></i>
            </button>
          </div>
          <!-- Center: Title -->
          <div class="min-w-0 flex-1 text-center typography-headline" style="white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">订单历史</div>
          <!-- Right: System Capsule -->
          <div class="flex h-8 w-[88px] items-center justify-center" style="margin-right: var(--spacing-lg); border-radius: var(--radius-full); background: var(--color-bg-secondary); border: 1px solid var(--color-border);">
            <button class="flex h-full flex-1 items-center justify-center" aria-label="更多">
              <i data-lucide="more-horizontal" class="h-4 w-4" style="color: var(--color-text-secondary);"></i>
            </button>
            <span class="h-4 w-px" style="background: var(--color-border);" aria-hidden="true"></span>
            <button class="flex h-full flex-1 items-center justify-center" aria-label="关闭">
              <i data-lucide="x" class="h-4 w-4" style="color: var(--color-text-secondary);"></i>
            </button>
          </div>
        </div>
      </header>

      <!-- Segmented Tabs -->
      <div class="sticky z-20" style="top:var(--nav-bar-height); background:var(--color-bg-primary); padding:var(--spacing-md) var(--spacing-lg) var(--spacing-sm);">
        <div class="inline-flex" style="background:var(--color-bg-tertiary); border-radius:var(--radius-sm); padding:2px;">
          <button class="whitespace-nowrap" style="padding:6px 14px; border-radius:var(--radius-xs); font-size:var(--text-sm); font-weight:var(--weight-semibold); background:var(--color-bg-primary); color:var(--color-text-primary); box-shadow:var(--shadow-sm);">全部</button>
          <button class="whitespace-nowrap" style="padding:6px 14px; border-radius:var(--radius-xs); font-size:var(--text-sm); font-weight:var(--weight-regular); background:transparent; color:var(--color-text-secondary);">待制作</button>
          <button class="whitespace-nowrap" style="padding:6px 14px; border-radius:var(--radius-xs); font-size:var(--text-sm); font-weight:var(--weight-regular); background:transparent; color:var(--color-text-secondary);">制作中</button>
          <button class="whitespace-nowrap" style="padding:6px 14px; border-radius:var(--radius-xs); font-size:var(--text-sm); font-weight:var(--weight-regular); background:transparent; color:var(--color-text-secondary);">已完成</button>
        </div>
      </div>

      <!-- Order List -->
      <div style="padding:var(--spacing-lg);">

        <!-- Date Group: Today -->
        <div style="margin-bottom:var(--spacing-lg);">
          <h3 class="typography-callout" style="padding:var(--spacing-sm) 0 var(--spacing-xs); color:var(--color-text-secondary); font-size:var(--text-sm); font-weight:var(--weight-medium);">今天</h3>

          <!-- Order Card 1 -->
          <div class="surface-card" style="padding:var(--spacing-lg); margin-bottom:var(--spacing-md);">
            <!-- Top row: order number + status -->
            <div class="flex items-center justify-between" style="margin-bottom:var(--spacing-sm);">
              <span style="font-size:var(--text-xs); color:var(--color-text-tertiary); white-space:nowrap;">订单号 #20250701001</span>
              <span class="inline-flex items-center whitespace-nowrap" style="font-size:var(--text-xs); font-weight:var(--weight-medium); padding:2px 8px; border-radius:var(--radius-full); background:var(--state-info-bg); color:var(--state-info);">制作中</span>
            </div>
            <!-- Dishes -->
            <p class="typography-body line-clamp-2" style="margin-bottom:var(--spacing-sm); font-size:var(--text-sm); color:var(--color-text-secondary);">红烧肉 x2, 西红柿炒蛋 x1, 蛋炒饭 x1</p>
            <!-- Bottom row: total + time -->
            <div class="flex items-center justify-between">
              <span style="font-size:var(--text-sm); font-weight:var(--weight-semibold); color:var(--color-primary);">合计 ¥109</span>
              <span style="font-size:var(--text-xs); color:var(--color-text-tertiary);">12:30</span>
            </div>
            <!-- Reorder button -->
            <button data-dom-id="goto-cart" class="mt-3" style="font-size:var(--text-sm); font-weight:var(--weight-medium); color:var(--color-primary); background:transparent; border:none; padding:0; cursor:pointer;">再来一单</button>
          </div>

          <!-- Order Card 2 -->
          <div class="surface-card" style="padding:var(--spacing-lg);">
            <!-- Top row: order number + status -->
            <div class="flex items-center justify-between" style="margin-bottom:var(--spacing-sm);">
              <span style="font-size:var(--text-xs); color:var(--color-text-tertiary); white-space:nowrap;">订单号 #20250701002</span>
              <span class="inline-flex items-center whitespace-nowrap" style="font-size:var(--text-xs); font-weight:var(--weight-medium); padding:2px 8px; border-radius:var(--radius-full); background:var(--state-success-bg); color:var(--state-success);">已完成</span>
            </div>
            <!-- Dishes -->
            <p class="typography-body line-clamp-2" style="margin-bottom:var(--spacing-sm); font-size:var(--text-sm); color:var(--color-text-secondary);">清炒时蔬 x1, 酸辣汤 x1</p>
            <!-- Bottom row: total + time -->
            <div class="flex items-center justify-between">
              <span style="font-size:var(--text-sm); font-weight:var(--weight-semibold); color:var(--color-primary);">合计 ¥33</span>
              <span style="font-size:var(--text-xs); color:var(--color-text-tertiary);">11:00</span>
            </div>
          </div>
        </div>

        <!-- Date Group: Yesterday -->
        <div>
          <h3 class="typography-callout" style="padding:var(--spacing-sm) 0 var(--spacing-xs); color:var(--color-text-secondary); font-size:var(--text-sm); font-weight:var(--weight-medium);">昨天</h3>

          <!-- Order Card 3 -->
          <div class="surface-card" style="padding:var(--spacing-lg); margin-bottom:var(--spacing-md);">
            <!-- Top row: order number + status -->
            <div class="flex items-center justify-between" style="margin-bottom:var(--spacing-sm);">
              <span style="font-size:var(--text-xs); color:var(--color-text-tertiary); white-space:nowrap;">订单号 #20250630001</span>
              <span class="inline-flex items-center whitespace-nowrap" style="font-size:var(--text-xs); font-weight:var(--weight-medium); padding:2px 8px; border-radius:var(--radius-full); background:var(--state-success-bg); color:var(--state-success);">已完成</span>
            </div>
            <!-- Dishes -->
            <p class="typography-body line-clamp-2" style="margin-bottom:var(--spacing-sm); font-size:var(--text-sm); color:var(--color-text-secondary);">红烧肉 x1, 蛋炒饭 x2</p>
            <!-- Bottom row: total + time -->
            <div class="flex items-center justify-between">
              <span style="font-size:var(--text-sm); font-weight:var(--weight-semibold); color:var(--color-primary);">合计 ¥68</span>
              <span style="font-size:var(--text-xs); color:var(--color-text-tertiary);">18:45</span>
            </div>
          </div>

          <!-- Order Card 4 -->
          <div class="surface-card" style="padding:var(--spacing-lg);">
            <!-- Top row: order number + status -->
            <div class="flex items-center justify-between" style="margin-bottom:var(--spacing-sm);">
              <span style="font-size:var(--text-xs); color:var(--color-text-tertiary); white-space:nowrap;">订单号 #20250630002</span>
              <span class="inline-flex items-center whitespace-nowrap" style="font-size:var(--text-xs); font-weight:var(--weight-medium); padding:2px 8px; border-radius:var(--radius-full); background:var(--state-warning-bg); color:var(--state-warning);">待制作</span>
            </div>
            <!-- Dishes -->
            <p class="typography-body line-clamp-2" style="margin-bottom:var(--spacing-sm); font-size:var(--text-sm); color:var(--color-text-secondary);">芒果布丁 x3</p>
            <!-- Bottom row: total + time -->
            <div class="flex items-center justify-between">
              <span style="font-size:var(--text-sm); font-weight:var(--weight-semibold); color:var(--color-primary);">合计 ¥45</span>
              <span style="font-size:var(--text-xs); color:var(--color-text-tertiary);">17:20</span>
            </div>
          </div>
        </div>

      </div>

      <!-- Bottom Tab Bar + Safe Area -->
      <div class="fixed bottom-0 inset-x-0 z-30" style="background:var(--color-bg-primary); border-top:1px solid var(--color-divider);">
        <nav style="height:var(--tab-bar-height);">
          <div class="flex items-center justify-around h-full">
            <!-- Tab: 菜单 -->
            <a href="#" class="flex flex-col items-center gap-0.5" style="text-decoration:none; color:var(--color-text-tertiary);">
              <i data-lucide="utensils" class="h-5 w-5"></i>
              <span style="font-size:var(--text-xs);">菜单</span>
            </a>
            <!-- Tab: 购物车 -->
            <a href="#" class="flex flex-col items-center gap-0.5" style="text-decoration:none; color:var(--color-text-tertiary);">
              <i data-lucide="shopping-cart" class="h-5 w-5"></i>
              <span style="font-size:var(--text-xs);">购物车</span>
            </a>
            <!-- Tab: 我的 (active) -->
            <a href="#" class="flex flex-col items-center gap-0.5" style="text-decoration:none; color:var(--color-primary);">
              <i data-lucide="user" class="h-5 w-5"></i>
              <span style="font-size:var(--text-xs); font-weight:var(--weight-medium);">我的</span>
            </a>
          </div>
        </nav>
        <!-- Safe Area Bottom -->
        <div style="height:env(safe-area-inset-bottom, 34px);"></div>
      </div>

    </main>
    <script>lucide.createIcons();</script>
</body>
</html>
