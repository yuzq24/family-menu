<!DOCTYPE html>
<html lang="zh-CN" class="light" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>菜品详情</title>
    <style id="theme-vars">
/* Family Menu - iOS-inspired Minimalist White Theme */
:root {
  /* Brand Colors */
  --color-primary: #FF6B35;
  --color-primary-hover: #E85A25;
  --color-primary-light: #FFF0EB;
  --color-primary-subtle: #FFF5F0;

  /* Neutrals - iOS System Gray Scale */
  --color-bg-primary: #FFFFFF;
  --color-bg-secondary: #F2F2F7;
  --color-bg-tertiary: #E5E5EA;
  --color-bg-elevated: #FFFFFF;

  /* Text Colors */
  --color-text-primary: #1C1C1E;
  --color-text-secondary: #8E8E93;
  --color-text-tertiary: #AEAEB2;
  --color-text-inverse: #FFFFFF;

  /* Semantic State Colors */
  --state-success: #34C759;
  --state-success-bg: #E8F9ED;
  --state-warning: #FF9F0A;
  --state-warning-bg: #FFF6E0;
  --state-error: #FF3B30;
  --state-error-bg: #FFE8E7;
  --state-info: #007AFF;
  --state-info-bg: #E5F1FF;

  /* Border & Divider */
  --color-border: rgba(0, 0, 0, 0.06);
  --color-border-strong: rgba(0, 0, 0, 0.12);
  --color-divider: rgba(60, 60, 67, 0.08);

  /* Shadows - iOS style subtle elevation */
  --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.04);
  --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.06);
  --shadow-lg: 0 12px 32px rgba(0, 0, 0, 0.10);
  --shadow-float: 0 16px 48px rgba(0, 0, 0, 0.12);

  /* Radius Scale - iOS style rounded corners */
  --radius-xs: 4px;
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-xl: 20px;
  --radius-full: 9999px;

  /* Spacing Scale */
  --spacing-xs: 4px;
  --spacing-sm: 8px;
  --spacing-md: 12px;
  --spacing-lg: 16px;
  --spacing-xl: 20px;
  --spacing-2xl: 24px;
  --spacing-3xl: 32px;
  --spacing-4xl: 40px;

  /* Typography - SF Pro inspired */
  --font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  --font-family-display: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  --font-family-body: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'PingFang SC', 'Microsoft YaHei', sans-serif;

  /* Type Scale */
  --text-xs: 11px;
  --text-xs-lh: 1.36;
  --text-sm: 13px;
  --text-sm-lh: 1.38;
  --text-base: 15px;
  --text-base-lh: 1.47;
  --text-md: 17px;
  --text-md-lh: 1.41;
  --text-lg: 20px;
  --text-lg-lh: 1.4;
  --text-xl: 24px;
  --text-xl-lh: 1.33;
  --text-2xl: 28px;
  --text-2xl-lh: 1.29;
  --text-3xl: 34px;
  --text-3xl-lh: 1.24;

  /* Font Weights */
  --weight-regular: 400;
  --weight-medium: 500;
  --weight-semibold: 600;
  --weight-bold: 700;

  /* Component Dimensions */
  --control-height-sm: 32px;
  --control-height-md: 36px;
  --control-height-lg: 44px;
  --control-height-xl: 50px;

  /* Mini Program Nav Bar */
  --nav-bar-height: 44px;
  --status-bar-height: 20px;
  --tab-bar-height: 49px;
  --safe-area-bottom: 34px;
}

/* Typography Classes */
.typography-display {
  font-family: var(--font-family-display);
  font-weight: var(--weight-bold);
  letter-spacing: -0.02em;
}

.typography-title-1 {
  font-family: var(--font-family-display);
  font-size: var(--text-3xl);
  font-weight: var(--weight-bold);
  letter-spacing: -0.02em;
  line-height: var(--text-3xl-lh);
  color: var(--color-text-primary);
}

.typography-title-2 {
  font-family: var(--font-family-display);
  font-size: var(--text-2xl);
  font-weight: var(--weight-bold);
  letter-spacing: -0.01em;
  line-height: var(--text-2xl-lh);
  color: var(--color-text-primary);
}

.typography-title-3 {
  font-family: var(--font-family-display);
  font-size: var(--text-xl);
  font-weight: var(--weight-semibold);
  letter-spacing: -0.01em;
  line-height: var(--text-xl-lh);
  color: var(--color-text-primary);
}

.typography-headline {
  font-family: var(--font-family-body);
  font-size: var(--text-md);
  font-weight: var(--weight-semibold);
  line-height: var(--text-md-lh);
  color: var(--color-text-primary);
}

.typography-body {
  font-family: var(--font-family-body);
  font-size: var(--text-base);
  font-weight: var(--weight-regular);
  line-height: var(--text-base-lh);
  color: var(--color-text-primary);
}

.typography-callout {
  font-family: var(--font-family-body);
  font-size: var(--text-sm);
  font-weight: var(--weight-regular);
  line-height: var(--text-sm-lh);
  color: var(--color-text-secondary);
}

.typography-caption {
  font-family: var(--font-family-body);
  font-size: var(--text-xs);
  font-weight: var(--weight-regular);
  line-height: var(--text-xs-lh);
  color: var(--color-text-tertiary);
}

.typography-price {
  font-family: var(--font-family-display);
  font-weight: var(--weight-bold);
  color: var(--color-primary);
}

/* iOS-style Card Surface */
.surface-card {
  background: var(--color-bg-elevated);
  border-radius: var(--radius-md);
  box-shadow: var(--shadow-sm);
}

/* iOS-style List Group */
.surface-grouped {
  background: var(--color-bg-elevated);
  border-radius: var(--radius-md);
  overflow: hidden;
}

/* iOS-style Floating Panel */
.surface-float {
  background: var(--color-bg-elevated);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-float);
}

    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  @theme inline {
    --color-primary: var(--color-primary);
    --color-border: var(--color-border);
  }
  @layer base {
    body { background: var(--color-bg-primary); color: var(--color-text-primary); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }
    </style>
</head>
<body class="min-h-screen" style="background: var(--color-bg-secondary); font-family: var(--font-family); color: var(--color-text-primary);">

    <!-- Nav Bar -->
    <header class="sticky top-0 z-30" style="background: rgba(255,255,255,0.92); backdrop-filter: blur(12px); border-bottom: 1px solid var(--color-border);">
      <div class="flex items-center justify-between px-4" style="height: var(--nav-bar-height);">
        <div class="flex items-center" style="width: 88px;">
          <button data-dom-id="back-to-list" class="inline-flex items-center justify-center rounded-lg" style="width: 32px; height: 32px; background: var(--color-bg-secondary);" aria-label="返回">
            <i data-lucide="chevron-left" class="w-4 h-4" style="color: var(--color-text-primary);"></i>
          </button>
        </div>
        <div class="flex-1 text-center font-semibold truncate" style="font-size: var(--text-md); letter-spacing: -0.02em; color: var(--color-text-primary);">菜品详情</div>
        <div class="flex h-8 w-[88px] items-center justify-center" style="margin-right: var(--spacing-lg); border-radius: var(--radius-full); background: var(--color-bg-secondary); border: 1px solid var(--color-border);">
          <button class="flex h-full flex-1 items-center justify-center" aria-label="更多">
            <i data-lucide="more-horizontal" class="h-4 w-4" style="color: var(--color-text-secondary);"></i>
          </button>
          <span class="h-4 w-px" style="background: var(--color-border);" aria-hidden="true"></span>
          <button class="flex h-full flex-1 items-center justify-center" aria-label="关闭">
            <i data-lucide="x" class="h-4 w-4" style="color: var(--color-text-secondary);"></i>
          </button>
        </div>
      </div>
    </header>

    <main class="pb-24">
      <!-- Hero Image -->
      <div class="relative overflow-hidden" style="border-radius: 0 0 var(--radius-xl) var(--radius-xl);">
        <img src="../assets/image_2_yi19x4.jpg" alt="红烧肉" class="w-full object-cover" style="height: 240px;">
      </div>

      <!-- Dish Info Card -->
      <section class="mx-4 relative" style="margin-top: -20px; z-index: 10;">
        <div class="surface-card p-5">
          <h1 class="font-bold truncate" style="font-size: var(--text-xl); line-height: var(--text-xl-lh); color: var(--color-text-primary); text-wrap: balance; word-break: keep-all; overflow-wrap: break-word;">红烧肉</h1>
          <p class="mt-2 line-clamp-2" style="font-size: var(--text-sm); line-height: var(--text-sm-lh); color: var(--color-text-secondary);">经典家常菜，肥而不腻，入口即化</p>
          <div class="flex items-center gap-3 mt-4 flex-wrap">
            <span class="typography-price whitespace-nowrap" style="font-size: var(--text-xl);">¥38</span>
            <div class="flex items-center gap-2 flex-wrap">
              <span class="inline-flex items-center whitespace-nowrap rounded-lg px-3 py-1" style="font-size: var(--text-sm); background: var(--color-bg-secondary); color: var(--color-text-secondary);">
                <i data-lucide="clock" class="w-3.5 h-3.5 mr-1" style="color: var(--color-text-tertiary);"></i>45分钟
              </span>
              <span class="inline-flex items-center whitespace-nowrap rounded-lg px-3 py-1" style="font-size: var(--text-sm); background: var(--color-bg-secondary); color: var(--color-text-secondary);">
                <i data-lucide="flame" class="w-3.5 h-3.5 mr-1" style="color: var(--color-text-tertiary);"></i>中等
              </span>
            </div>
          </div>
        </div>
      </section>

      <!-- Ingredients Section -->
      <section class="mx-4 mt-4">
        <div class="surface-card p-5">
          <h2 class="font-semibold mb-4" style="font-size: var(--text-lg); color: var(--color-text-primary);">食材配料</h2>
          <div class="grid grid-cols-2 gap-2">
            <span class="inline-flex items-center justify-center whitespace-nowrap rounded-lg px-3 py-2 text-center" style="font-size: var(--text-sm); background: var(--color-bg-secondary); color: var(--color-text-primary);">五花肉 500g</span>
            <span class="inline-flex items-center justify-center whitespace-nowrap rounded-lg px-3 py-2 text-center" style="font-size: var(--text-sm); background: var(--color-bg-secondary); color: var(--color-text-primary);">冰糖 30g</span>
            <span class="inline-flex items-center justify-center whitespace-nowrap rounded-lg px-3 py-2 text-center" style="font-size: var(--text-sm); background: var(--color-bg-secondary); color: var(--color-text-primary);">生抽</span>
            <span class="inline-flex items-center justify-center whitespace-nowrap rounded-lg px-3 py-2 text-center" style="font-size: var(--text-sm); background: var(--color-bg-secondary); color: var(--color-text-primary);">老抽</span>
            <span class="inline-flex items-center justify-center whitespace-nowrap rounded-lg px-3 py-2 text-center" style="font-size: var(--text-sm); background: var(--color-bg-secondary); color: var(--color-text-primary);">料酒</span>
            <span class="inline-flex items-center justify-center whitespace-nowrap rounded-lg px-3 py-2 text-center" style="font-size: var(--text-sm); background: var(--color-bg-secondary); color: var(--color-text-primary);">姜片</span>
            <span class="inline-flex items-center justify-center whitespace-nowrap rounded-lg px-3 py-2 text-center" style="font-size: var(--text-sm); background: var(--color-bg-secondary); color: var(--color-text-primary);">八角</span>
            <span class="inline-flex items-center justify-center whitespace-nowrap rounded-lg px-3 py-2 text-center" style="font-size: var(--text-sm); background: var(--color-bg-secondary); color: var(--color-text-primary);">葱段</span>
          </div>
        </div>
      </section>

      <!-- Nutrition Section -->
      <section class="mx-4 mt-4">
        <div class="surface-card p-5">
          <h2 class="font-semibold mb-4" style="font-size: var(--text-lg); color: var(--color-text-primary);">营养信息</h2>
          <div class="grid grid-cols-3 gap-4 text-center">
            <div>
              <div class="font-bold whitespace-nowrap" style="font-size: var(--text-xl); color: var(--color-primary); font-variant-numeric: tabular-nums;">380</div>
              <div class="mt-1 whitespace-nowrap" style="font-size: var(--text-sm); color: var(--color-text-secondary);">热量 kcal</div>
            </div>
            <div>
              <div class="font-bold whitespace-nowrap" style="font-size: var(--text-xl); color: var(--color-primary); font-variant-numeric: tabular-nums;">25</div>
              <div class="mt-1 whitespace-nowrap" style="font-size: var(--text-sm); color: var(--color-text-secondary);">蛋白质 g</div>
            </div>
            <div>
              <div class="font-bold whitespace-nowrap" style="font-size: var(--text-xl); color: var(--color-primary); font-variant-numeric: tabular-nums;">18</div>
              <div class="mt-1 whitespace-nowrap" style="font-size: var(--text-sm); color: var(--color-text-secondary);">脂肪 g</div>
            </div>
          </div>
        </div>
      </section>

      <!-- Cooking Steps Section -->
      <section class="mx-4 mt-4">
        <div class="surface-card p-5">
          <h2 class="font-semibold mb-5" style="font-size: var(--text-lg); color: var(--color-text-primary);">烹饪步骤</h2>
          <div class="space-y-0">
            <!-- Step 1 -->
            <div class="flex gap-3">
              <div class="flex flex-col items-center">
                <div class="flex items-center justify-center shrink-0" style="width: 28px; height: 28px; border-radius: var(--radius-full); background: var(--color-primary); font-size: var(--text-sm); font-weight: var(--weight-semibold); color: var(--color-text-inverse);">1</div>
                <div class="flex-1 w-px" style="background: var(--color-border-strong); min-height: 20px;"></div>
              </div>
              <div class="pb-5">
                <p class="pt-0.5" style="font-size: var(--text-base); line-height: var(--text-base-lh); color: var(--color-text-primary);">五花肉切块，冷水下锅焯水去血沫，捞出沥干备用</p>
              </div>
            </div>
            <!-- Step 2 -->
            <div class="flex gap-3">
              <div class="flex flex-col items-center">
                <div class="flex items-center justify-center shrink-0" style="width: 28px; height: 28px; border-radius: var(--radius-full); background: var(--color-primary); font-size: var(--text-sm); font-weight: var(--weight-semibold); color: var(--color-text-inverse);">2</div>
                <div class="flex-1 w-px" style="background: var(--color-border-strong); min-height: 20px;"></div>
              </div>
              <div class="pb-5">
                <p class="pt-0.5" style="font-size: var(--text-base); line-height: var(--text-base-lh); color: var(--color-text-primary);">锅中放少许油，加冰糖小火炒至琥珀色起泡</p>
              </div>
            </div>
            <!-- Step 3 -->
            <div class="flex gap-3">
              <div class="flex flex-col items-center">
                <div class="flex items-center justify-center shrink-0" style="width: 28px; height: 28px; border-radius: var(--radius-full); background: var(--color-primary); font-size: var(--text-sm); font-weight: var(--weight-semibold); color: var(--color-text-inverse);">3</div>
                <div class="flex-1 w-px" style="background: var(--color-border-strong); min-height: 20px;"></div>
              </div>
              <div class="pb-5">
                <p class="pt-0.5" style="font-size: var(--text-base); line-height: var(--text-base-lh); color: var(--color-text-primary);">放入肉块翻炒上色，加生抽、老抽、料酒和姜片八角调味</p>
              </div>
            </div>
            <!-- Step 4 -->
            <div class="flex gap-3">
              <div class="flex flex-col items-center">
                <div class="flex items-center justify-center shrink-0" style="width: 28px; height: 28px; border-radius: var(--radius-full); background: var(--color-primary); font-size: var(--text-sm); font-weight: var(--weight-semibold); color: var(--color-text-inverse);">4</div>
              </div>
              <div>
                <p class="pt-0.5" style="font-size: var(--text-base); line-height: var(--text-base-lh); color: var(--color-text-primary);">加入开水没过肉块，大火烧开后转小火炖40分钟，大火收汁撒葱段即可</p>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <!-- Floating Bottom Bar -->
    <div class="fixed bottom-0 inset-x-0 z-40" style="background: var(--color-bg-primary); box-shadow: var(--shadow-lg); padding-bottom: env(safe-area-inset-bottom, 0px);">
      <div class="flex items-center gap-4 px-4 py-3">
        <div class="flex items-center gap-2" style="background: var(--color-bg-secondary); border-radius: var(--radius-lg); padding: 4px;">
          <button class="flex items-center justify-center" style="width: 32px; height: 32px; border-radius: var(--radius-sm);" aria-label="减少数量">
            <i data-lucide="minus" class="w-4 h-4" style="color: var(--color-text-primary);"></i>
          </button>
          <span class="font-semibold whitespace-nowrap" style="font-size: var(--text-base); min-width: 20px; text-align: center; color: var(--color-text-primary);">1</span>
          <button class="flex items-center justify-center" style="width: 32px; height: 32px; border-radius: var(--radius-sm); background: var(--color-primary);" aria-label="增加数量">
            <i data-lucide="plus" class="w-4 h-4" style="color: var(--color-text-inverse);"></i>
          </button>
        </div>
        <button data-dom-id="add-to-cart" class="flex-1 flex items-center justify-center font-semibold rounded-lg transition-opacity duration-150 active:opacity-80" style="height: var(--control-height-lg); background: var(--color-primary); color: var(--color-text-inverse); font-size: var(--text-md); border: none; cursor: pointer;">
          加入购物车
        </button>
      </div>
    </div>

    <script>lucide.createIcons();</script>

    <style>
      /* Step hover micro-interaction */
      .surface-card:has(div.flex.gap-3) div.flex.gap-3:hover > div:first-child > div:first-child {
        transform: scale(1.1);
        transition: transform 150ms cubic-bezier(.2,.8,.2,1);
      }

      /* Button active feedback */
      button:active {
        transform: scale(0.97);
        transition: transform 100ms cubic-bezier(.2,.8,.2,1);
      }

      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          transition-duration: 0.01ms !important;
          animation-duration: 0.01ms !important;
        }
      }
    </style>
</body>
</html>
