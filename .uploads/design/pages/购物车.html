<!DOCTYPE html>
<html lang="zh-CN" class="light" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>购物车</title>
    <style id="theme-vars">
/* Family Menu - iOS-inspired Minimalist White Theme */
:root {
  /* Brand Colors */
  --color-primary: #FF6B35;
  --color-primary-hover: #E85A25;
  --color-primary-light: #FFF0EB;
  --color-primary-subtle: #FFF5F0;

  /* Neutrals - iOS System Gray Scale */
  --color-bg-primary: #FFFFFF;
  --color-bg-secondary: #F2F2F7;
  --color-bg-tertiary: #E5E5EA;
  --color-bg-elevated: #FFFFFF;

  /* Text Colors */
  --color-text-primary: #1C1C1E;
  --color-text-secondary: #8E8E93;
  --color-text-tertiary: #AEAEB2;
  --color-text-inverse: #FFFFFF;

  /* Semantic State Colors */
  --state-success: #34C759;
  --state-success-bg: #E8F9ED;
  --state-warning: #FF9F0A;
  --state-warning-bg: #FFF6E0;
  --state-error: #FF3B30;
  --state-error-bg: #FFE8E7;
  --state-info: #007AFF;
  --state-info-bg: #E5F1FF;

  /* Border & Divider */
  --color-border: rgba(0, 0, 0, 0.06);
  --color-border-strong: rgba(0, 0, 0, 0.12);
  --color-divider: rgba(60, 60, 67, 0.08);

  /* Shadows - iOS style subtle elevation */
  --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.04);
  --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.06);
  --shadow-lg: 0 12px 32px rgba(0, 0, 0, 0.10);
  --shadow-float: 0 16px 48px rgba(0, 0, 0, 0.12);

  /* Radius Scale - iOS style rounded corners */
  --radius-xs: 4px;
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-xl: 20px;
  --radius-full: 9999px;

  /* Spacing Scale */
  --spacing-xs: 4px;
  --spacing-sm: 8px;
  --spacing-md: 12px;
  --spacing-lg: 16px;
  --spacing-xl: 20px;
  --spacing-2xl: 24px;
  --spacing-3xl: 32px;
  --spacing-4xl: 40px;

  /* Typography - SF Pro inspired */
  --font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  --font-family-display: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  --font-family-body: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'PingFang SC', 'Microsoft YaHei', sans-serif;

  /* Type Scale */
  --text-xs: 11px;
  --text-xs-lh: 1.36;
  --text-sm: 13px;
  --text-sm-lh: 1.38;
  --text-base: 15px;
  --text-base-lh: 1.47;
  --text-md: 17px;
  --text-md-lh: 1.41;
  --text-lg: 20px;
  --text-lg-lh: 1.4;
  --text-xl: 24px;
  --text-xl-lh: 1.33;
  --text-2xl: 28px;
  --text-2xl-lh: 1.29;
  --text-3xl: 34px;
  --text-3xl-lh: 1.24;

  /* Font Weights */
  --weight-regular: 400;
  --weight-medium: 500;
  --weight-semibold: 600;
  --weight-bold: 700;

  /* Component Dimensions */
  --control-height-sm: 32px;
  --control-height-md: 36px;
  --control-height-lg: 44px;
  --control-height-xl: 50px;

  /* Mini Program Nav Bar */
  --nav-bar-height: 44px;
  --status-bar-height: 20px;
  --tab-bar-height: 49px;
  --safe-area-bottom: 34px;
}

/* Typography Classes */
.typography-display {
  font-family: var(--font-family-display);
  font-weight: var(--weight-bold);
  letter-spacing: -0.02em;
}

.typography-title-1 {
  font-family: var(--font-family-display);
  font-size: var(--text-3xl);
  font-weight: var(--weight-bold);
  letter-spacing: -0.02em;
  line-height: var(--text-3xl-lh);
  color: var(--color-text-primary);
}

.typography-title-2 {
  font-family: var(--font-family-display);
  font-size: var(--text-2xl);
  font-weight: var(--weight-bold);
  letter-spacing: -0.01em;
  line-height: var(--text-2xl-lh);
  color: var(--color-text-primary);
}

.typography-title-3 {
  font-family: var(--font-family-display);
  font-size: var(--text-xl);
  font-weight: var(--weight-semibold);
  letter-spacing: -0.01em;
  line-height: var(--text-xl-lh);
  color: var(--color-text-primary);
}

.typography-headline {
  font-family: var(--font-family-body);
  font-size: var(--text-md);
  font-weight: var(--weight-semibold);
  line-height: var(--text-md-lh);
  color: var(--color-text-primary);
}

.typography-body {
  font-family: var(--font-family-body);
  font-size: var(--text-base);
  font-weight: var(--weight-regular);
  line-height: var(--text-base-lh);
  color: var(--color-text-primary);
}

.typography-callout {
  font-family: var(--font-family-body);
  font-size: var(--text-sm);
  font-weight: var(--weight-regular);
  line-height: var(--text-sm-lh);
  color: var(--color-text-secondary);
}

.typography-caption {
  font-family: var(--font-family-body);
  font-size: var(--text-xs);
  font-weight: var(--weight-regular);
  line-height: var(--text-xs-lh);
  color: var(--color-text-tertiary);
}

.typography-price {
  font-family: var(--font-family-display);
  font-weight: var(--weight-bold);
  color: var(--color-primary);
}

/* iOS-style Card Surface */
.surface-card {
  background: var(--color-bg-elevated);
  border-radius: var(--radius-md);
  box-shadow: var(--shadow-sm);
}

/* iOS-style List Group */
.surface-grouped {
  background: var(--color-bg-elevated);
  border-radius: var(--radius-md);
  overflow: hidden;
}

/* iOS-style Floating Panel */
.surface-float {
  background: var(--color-bg-elevated);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-float);
}

    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  @theme inline {
    --color-primary: var(--color-primary);
    --color-border: var(--color-border);
  }
  @layer base {
    body { background: var(--color-bg-primary); color: var(--color-text-primary); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }
    </style>
</head>
<body class="min-h-screen font-sans antialiased" style="background: var(--color-bg-secondary); font-family: var(--font-family);">

    <main class="pb-24">

      <!-- Status Bar Spacer -->
      <div style="height: var(--status-bar-height);"></div>

      <!-- Nav Bar -->
      <header class="sticky top-0 z-30" style="background: var(--color-bg-primary); border-bottom: 1px solid var(--color-divider);">
        <div class="flex items-center" style="height: var(--nav-bar-height);">
          <!-- Left: Back -->
          <div class="flex items-center justify-start" style="width: 88px;">
            <button data-dom-id="back-to-list" class="inline-flex items-center justify-center" style="width: 32px; height: 32px; border-radius: var(--radius-sm);" aria-label="返回">
              <i data-lucide="chevron-left" style="width: 20px; height: 20px; color: var(--color-text-primary);"></i>
            </button>
          </div>
          <!-- Center: Title -->
          <div class="min-w-0 flex-1 text-center" style="font-size: var(--text-md); font-weight: var(--weight-semibold); color: var(--color-text-primary); line-height: var(--text-md-lh); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">
            购物车
          </div>
          <!-- Right: System Capsule -->
          <div class="flex h-8 w-[88px] items-center justify-center" style="margin-right: var(--spacing-lg); border-radius: var(--radius-full); background: var(--color-bg-secondary); border: 1px solid var(--color-border);">
            <button class="flex h-full flex-1 items-center justify-center" aria-label="更多">
              <i data-lucide="more-horizontal" class="h-4 w-4" style="color: var(--color-text-secondary);"></i>
            </button>
            <span class="h-4 w-px" style="background: var(--color-border);" aria-hidden="true"></span>
            <button class="flex h-full flex-1 items-center justify-center" aria-label="关闭">
              <i data-lucide="x" class="h-4 w-4" style="color: var(--color-text-secondary);"></i>
            </button>
          </div>
        </div>
      </header>

      <!-- Cart Items Card -->
      <section class="mx-3 mt-3" style="background: var(--color-bg-elevated); border-radius: var(--radius-md); box-shadow: var(--shadow-sm); overflow: hidden;">

        <!-- Item 1: 红烧肉 -->
        <div class="flex items-center" style="padding: 12px var(--spacing-lg);">
          <!-- Thumbnail -->
          <img src="../assets/image_2_yi19x4.jpg" alt="红烧肉" class="shrink-0 object-cover" style="width: 64px; height: 64px; border-radius: var(--radius-sm);">
          <!-- Middle: Info -->
          <div class="flex-1 min-w-0" style="margin-left: var(--spacing-md);">
            <p class="truncate" style="font-size: 15px; font-weight: var(--weight-semibold); color: var(--color-text-primary); line-height: 1.4;">红烧肉</p>
            <p class="truncate" style="font-size: var(--text-sm); color: var(--color-text-secondary); margin-top: 2px;">经典家常菜，软糯入味</p>
            <!-- Stepper + Price row -->
            <div class="flex items-center justify-between" style="margin-top: var(--spacing-sm);">
              <div class="flex items-center gap-2">
                <!-- Minus -->
                <button class="flex items-center justify-center" style="width: 28px; height: 28px; border-radius: 50%; border: 1px solid var(--color-border-strong); background: transparent;" aria-label="减少数量">
                  <i data-lucide="minus" style="width: 14px; height: 14px; color: var(--color-text-tertiary);"></i>
                </button>
                <span style="font-size: var(--text-base); font-weight: var(--weight-medium); color: var(--color-text-primary); min-width: 20px; text-align: center;">2</span>
                <!-- Plus -->
                <button class="flex items-center justify-center" style="width: 28px; height: 28px; border-radius: 50%; border: none; background: var(--color-primary);" aria-label="增加数量">
                  <i data-lucide="plus" style="width: 14px; height: 14px; color: var(--color-text-inverse);"></i>
                </button>
              </div>
              <span style="font-size: var(--text-sm); font-weight: var(--weight-bold); color: var(--color-primary);">¥76</span>
            </div>
          </div>
        </div>

        <!-- Divider -->
        <div style="height: 1px; background: var(--color-divider); margin-left: 92px;"></div>

        <!-- Item 2: 西红柿炒蛋 -->
        <div class="flex items-center" style="padding: 12px var(--spacing-lg);">
          <!-- Placeholder thumbnail -->
          <div class="shrink-0" style="width: 64px; height: 64px; border-radius: var(--radius-sm); background: linear-gradient(135deg, #FF6B35 0%, #FF9F0A 100%);"></div>
          <!-- Middle: Info -->
          <div class="flex-1 min-w-0" style="margin-left: var(--spacing-md);">
            <p class="truncate" style="font-size: 15px; font-weight: var(--weight-semibold); color: var(--color-text-primary); line-height: 1.4;">西红柿炒蛋</p>
            <p class="truncate" style="font-size: var(--text-sm); color: var(--color-text-secondary); margin-top: 2px;">酸甜可口，营养丰富</p>
            <!-- Stepper + Price row -->
            <div class="flex items-center justify-between" style="margin-top: var(--spacing-sm);">
              <div class="flex items-center gap-2">
                <button class="flex items-center justify-center" style="width: 28px; height: 28px; border-radius: 50%; border: 1px solid var(--color-border-strong); background: transparent;" aria-label="减少数量">
                  <i data-lucide="minus" style="width: 14px; height: 14px; color: var(--color-text-tertiary);"></i>
                </button>
                <span style="font-size: var(--text-base); font-weight: var(--weight-medium); color: var(--color-text-primary); min-width: 20px; text-align: center;">1</span>
                <button class="flex items-center justify-center" style="width: 28px; height: 28px; border-radius: 50%; border: none; background: var(--color-primary);" aria-label="增加数量">
                  <i data-lucide="plus" style="width: 14px; height: 14px; color: var(--color-text-inverse);"></i>
                </button>
              </div>
              <span style="font-size: var(--text-sm); font-weight: var(--weight-bold); color: var(--color-primary);">¥18</span>
            </div>
          </div>
        </div>

        <!-- Divider -->
        <div style="height: 1px; background: var(--color-divider); margin-left: 92px;"></div>

        <!-- Item 3: 蛋炒饭 -->
        <div class="flex items-center" style="padding: 12px var(--spacing-lg);">
          <!-- Placeholder thumbnail -->
          <div class="shrink-0" style="width: 64px; height: 64px; border-radius: var(--radius-sm); background: linear-gradient(135deg, #34C759 0%, #A8D8A8 100%);"></div>
          <!-- Middle: Info -->
          <div class="flex-1 min-w-0" style="margin-left: var(--spacing-md);">
            <p class="truncate" style="font-size: 15px; font-weight: var(--weight-semibold); color: var(--color-text-primary); line-height: 1.4;">蛋炒饭</p>
            <p class="truncate" style="font-size: var(--text-sm); color: var(--color-text-secondary); margin-top: 2px;">粒粒分明，蛋香四溢</p>
            <!-- Stepper + Price row -->
            <div class="flex items-center justify-between" style="margin-top: var(--spacing-sm);">
              <div class="flex items-center gap-2">
                <button class="flex items-center justify-center" style="width: 28px; height: 28px; border-radius: 50%; border: 1px solid var(--color-border-strong); background: transparent;" aria-label="减少数量">
                  <i data-lucide="minus" style="width: 14px; height: 14px; color: var(--color-text-tertiary);"></i>
                </button>
                <span style="font-size: var(--text-base); font-weight: var(--weight-medium); color: var(--color-text-primary); min-width: 20px; text-align: center;">1</span>
                <button class="flex items-center justify-center" style="width: 28px; height: 28px; border-radius: 50%; border: none; background: var(--color-primary);" aria-label="增加数量">
                  <i data-lucide="plus" style="width: 14px; height: 14px; color: var(--color-text-inverse);"></i>
                </button>
              </div>
              <span style="font-size: var(--text-sm); font-weight: var(--weight-bold); color: var(--color-primary);">¥15</span>
            </div>
          </div>
        </div>

        <!-- Swipe delete hint -->
        <div class="flex items-center justify-end" style="padding: 0 var(--spacing-lg) 8px;">
          <span style="font-size: var(--text-xs); color: var(--state-error); font-weight: var(--weight-medium);">左滑删除</span>
        </div>
      </section>

      <!-- Order Summary Card -->
      <section class="mx-3 mt-3" style="background: var(--color-bg-elevated); border-radius: var(--radius-md); box-shadow: var(--shadow-sm); padding: var(--spacing-lg);">
        <div class="flex items-center justify-between">
          <span style="font-size: var(--text-base); color: var(--color-text-secondary);">小计</span>
          <span style="font-size: var(--text-base); color: var(--color-text-primary); font-weight: var(--weight-medium);">¥109</span>
        </div>
        <!-- Divider -->
        <div style="height: 1px; background: var(--color-divider); margin-top: var(--spacing-md); margin-bottom: var(--spacing-md);"></div>
        <div class="flex items-center justify-between">
          <span style="font-size: var(--text-base); color: var(--color-text-primary); font-weight: var(--weight-semibold);">合计</span>
          <span class="typography-price" style="font-size: 20px;">¥109</span>
        </div>
      </section>

      <!-- Empty State (hidden) -->
      <section class="hidden flex-col items-center justify-center" style="padding-top: 80px;">
        <div class="flex items-center justify-center" style="width: 96px; height: 96px; border-radius: 50%; background: var(--color-bg-tertiary); margin-bottom: var(--spacing-lg);">
          <i data-lucide="shopping-cart" style="width: 40px; height: 40px; color: var(--color-text-tertiary);"></i>
        </div>
        <p style="font-size: var(--text-md); color: var(--color-text-secondary); font-weight: var(--weight-medium); margin-bottom: var(--spacing-xs);">购物车是空的</p>
        <p style="font-size: var(--text-sm); color: var(--color-text-tertiary); margin-bottom: var(--spacing-xl);">去挑选心仪的菜品吧</p>
        <button class="flex items-center justify-center" style="height: 44px; padding: 0 24px; border-radius: var(--radius-lg); background: var(--color-primary); font-size: var(--text-base); font-weight: var(--weight-semibold); color: var(--color-text-inverse);">去逛逛</button>
      </section>

      <!-- Spacer for floating bar -->
      <div style="height: 80px;"></div>

    </main>

    <!-- Floating Bottom Bar -->
    <div class="fixed inset-x-0 bottom-0 z-40 flex items-center justify-between" style="background: var(--color-bg-elevated); box-shadow: 0 -1px 0 var(--color-divider), var(--shadow-lg); padding: var(--spacing-md) var(--spacing-lg); padding-bottom: calc(var(--spacing-md) + var(--safe-area-bottom));">
      <div class="flex items-baseline gap-1">
        <span style="font-size: var(--text-sm); color: var(--color-text-secondary);">合计</span>
        <span class="typography-price" style="font-size: 20px;">¥109</span>
      </div>
      <button data-dom-id="goto-checkout" class="flex items-center justify-center" style="height: 44px; padding: 0 32px; border-radius: var(--radius-lg); background: var(--color-primary); font-size: var(--text-base); font-weight: var(--weight-semibold); color: var(--color-text-inverse); transition: background-color 160ms cubic-bezier(.2,.8,.2,1);"
        onmouseenter="this.style.background='var(--color-primary-hover)'"
        onmouseleave="this.style.background='var(--color-primary)'"
      >提交订单</button>
    </div>

    <script>lucide.createIcons();</script>
</body>
</html>
