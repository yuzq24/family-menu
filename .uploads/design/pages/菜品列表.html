<!DOCTYPE html>
<html lang="zh-CN" class="light" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Untitled</title>
    <style id="theme-vars">
/* Family Menu - iOS-inspired Minimalist White Theme */
:root {
  /* Brand Colors */
  --color-primary: #FF6B35;
  --color-primary-hover: #E85A25;
  --color-primary-light: #FFF0EB;
  --color-primary-subtle: #FFF5F0;

  /* Neutrals - iOS System Gray Scale */
  --color-bg-primary: #FFFFFF;
  --color-bg-secondary: #F2F2F7;
  --color-bg-tertiary: #E5E5EA;
  --color-bg-elevated: #FFFFFF;

  /* Text Colors */
  --color-text-primary: #1C1C1E;
  --color-text-secondary: #8E8E93;
  --color-text-tertiary: #AEAEB2;
  --color-text-inverse: #FFFFFF;

  /* Semantic State Colors */
  --state-success: #34C759;
  --state-success-bg: #E8F9ED;
  --state-warning: #FF9F0A;
  --state-warning-bg: #FFF6E0;
  --state-error: #FF3B30;
  --state-error-bg: #FFE8E7;
  --state-info: #007AFF;
  --state-info-bg: #E5F1FF;

  /* Border & Divider */
  --color-border: rgba(0, 0, 0, 0.06);
  --color-border-strong: rgba(0, 0, 0, 0.12);
  --color-divider: rgba(60, 60, 67, 0.08);

  /* Shadows - iOS style subtle elevation */
  --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.04);
  --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.06);
  --shadow-lg: 0 12px 32px rgba(0, 0, 0, 0.10);
  --shadow-float: 0 16px 48px rgba(0, 0, 0, 0.12);

  /* Radius Scale - iOS style rounded corners */
  --radius-xs: 4px;
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-xl: 20px;
  --radius-full: 9999px;

  /* Spacing Scale */
  --spacing-xs: 4px;
  --spacing-sm: 8px;
  --spacing-md: 12px;
  --spacing-lg: 16px;
  --spacing-xl: 20px;
  --spacing-2xl: 24px;
  --spacing-3xl: 32px;
  --spacing-4xl: 40px;

  /* Typography - SF Pro inspired */
  --font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  --font-family-display: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  --font-family-body: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'PingFang SC', 'Microsoft YaHei', sans-serif;

  /* Type Scale */
  --text-xs: 11px;
  --text-xs-lh: 1.36;
  --text-sm: 13px;
  --text-sm-lh: 1.38;
  --text-base: 15px;
  --text-base-lh: 1.47;
  --text-md: 17px;
  --text-md-lh: 1.41;
  --text-lg: 20px;
  --text-lg-lh: 1.4;
  --text-xl: 24px;
  --text-xl-lh: 1.33;
  --text-2xl: 28px;
  --text-2xl-lh: 1.29;
  --text-3xl: 34px;
  --text-3xl-lh: 1.24;

  /* Font Weights */
  --weight-regular: 400;
  --weight-medium: 500;
  --weight-semibold: 600;
  --weight-bold: 700;

  /* Component Dimensions */
  --control-height-sm: 32px;
  --control-height-md: 36px;
  --control-height-lg: 44px;
  --control-height-xl: 50px;

  /* Mini Program Nav Bar */
  --nav-bar-height: 44px;
  --status-bar-height: 20px;
  --tab-bar-height: 49px;
  --safe-area-bottom: 34px;
}

/* Typography Classes */
.typography-display {
  font-family: var(--font-family-display);
  font-weight: var(--weight-bold);
  letter-spacing: -0.02em;
}

.typography-title-1 {
  font-family: var(--font-family-display);
  font-size: var(--text-3xl);
  font-weight: var(--weight-bold);
  letter-spacing: -0.02em;
  line-height: var(--text-3xl-lh);
  color: var(--color-text-primary);
}

.typography-title-2 {
  font-family: var(--font-family-display);
  font-size: var(--text-2xl);
  font-weight: var(--weight-bold);
  letter-spacing: -0.01em;
  line-height: var(--text-2xl-lh);
  color: var(--color-text-primary);
}

.typography-title-3 {
  font-family: var(--font-family-display);
  font-size: var(--text-xl);
  font-weight: var(--weight-semibold);
  letter-spacing: -0.01em;
  line-height: var(--text-xl-lh);
  color: var(--color-text-primary);
}

.typography-headline {
  font-family: var(--font-family-body);
  font-size: var(--text-md);
  font-weight: var(--weight-semibold);
  line-height: var(--text-md-lh);
  color: var(--color-text-primary);
}

.typography-body {
  font-family: var(--font-family-body);
  font-size: var(--text-base);
  font-weight: var(--weight-regular);
  line-height: var(--text-base-lh);
  color: var(--color-text-primary);
}

.typography-callout {
  font-family: var(--font-family-body);
  font-size: var(--text-sm);
  font-weight: var(--weight-regular);
  line-height: var(--text-sm-lh);
  color: var(--color-text-secondary);
}

.typography-caption {
  font-family: var(--font-family-body);
  font-size: var(--text-xs);
  font-weight: var(--weight-regular);
  line-height: var(--text-xs-lh);
  color: var(--color-text-tertiary);
}

.typography-price {
  font-family: var(--font-family-display);
  font-weight: var(--weight-bold);
  color: var(--color-primary);
}

/* iOS-style Card Surface */
.surface-card {
  background: var(--color-bg-elevated);
  border-radius: var(--radius-md);
  box-shadow: var(--shadow-sm);
}

/* iOS-style List Group */
.surface-grouped {
  background: var(--color-bg-elevated);
  border-radius: var(--radius-md);
  overflow: hidden;
}

/* iOS-style Floating Panel */
.surface-float {
  background: var(--color-bg-elevated);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-float);
}

    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  @theme inline {
    --color-primary: var(--color-primary);
    --color-border: var(--color-border);
  }
  @layer base {
    body { background: var(--color-bg-secondary); color: var(--color-text-primary); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }
    </style>
</head>
<body class="min-h-screen font-sans antialiased">
    <main>

<!-- Status Bar Spacer -->
<div style="height:20px; background:var(--color-bg-primary);"></div>

<!-- Nav Bar -->
<header style="position:sticky; top:0; z-index:30; height:44px; background:var(--color-bg-primary); border-bottom:1px solid var(--color-divider); display:flex; align-items:center; padding:0;">
  <!-- Left: Cart Icon -->
  <div style="width:88px; display:flex; align-items:center; justify-content:flex-start; padding-left:16px;">
    <button data-dom-id="goto-cart" aria-label="购物车" style="display:inline-flex; align-items:center; justify-content:center; width:36px; height:36px; border-radius:var(--radius-sm); border:none; background:transparent; cursor:pointer; transition:opacity 120ms ease;">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="var(--color-text-primary)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/>
        <line x1="3" y1="6" x2="21" y2="6"/>
        <path d="M16 10a4 4 0 01-8 0"/>
      </svg>
    </button>
  </div>
  <!-- Center: Title -->
  <div style="flex:1; text-align:center; font-size:17px; font-weight:600; color:var(--color-text-primary); line-height:1.41; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">
    家庭菜单
  </div>
  <!-- Right: System Capsule -->
  <div class="flex h-8 w-[88px] items-center justify-center" style="margin-right: var(--spacing-lg); border-radius: var(--radius-full); background: var(--color-bg-secondary); border: 1px solid var(--color-border);">
    <button class="flex h-full flex-1 items-center justify-center" aria-label="更多">
      <i data-lucide="more-horizontal" class="h-4 w-4" style="color: var(--color-text-secondary);"></i>
    </button>
    <span class="h-4 w-px" style="background: var(--color-border);" aria-hidden="true"></span>
    <button class="flex h-full flex-1 items-center justify-center" aria-label="关闭">
      <i data-lucide="x" class="h-4 w-4" style="color: var(--color-text-secondary);"></i>
    </button>
  </div>
</header>

<!-- Main Content Area -->
<div style="padding-bottom:calc(var(--tab-bar-height) + var(--safe-area-bottom));">

  <!-- Search Bar -->
  <div style="padding:10px 16px 8px;">
    <div style="position:relative;">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--color-text-tertiary)" stroke-width="2" stroke-linecap="round" style="position:absolute; left:12px; top:50%; transform:translateY(-50%);">
        <circle cx="11" cy="11" r="8"/>
        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input type="text" placeholder="搜索菜品..." style="width:100%; height:36px; border-radius:var(--radius-full); border:1px solid var(--color-bg-tertiary); background:var(--color-bg-primary); padding:0 12px 0 36px; font-size:var(--text-sm); color:var(--color-text-primary); outline:none; font-family:var(--font-family-body); transition:border-color 120ms ease;" />
    </div>
  </div>

  <!-- Category Tabs -->
  <div style="padding:4px 16px 12px; overflow-x:auto; white-space:nowrap; display:flex; gap:8px;" class="no-scrollbar">
    <button style="flex-shrink:0; height:32px; padding:0 16px; border-radius:var(--radius-full); border:none; background:var(--color-primary); color:var(--color-text-inverse); font-size:var(--text-sm); font-weight:var(--weight-medium); font-family:var(--font-family-body); cursor:pointer; transition:opacity 120ms ease;">全部</button>
    <button style="flex-shrink:0; height:32px; padding:0 16px; border-radius:var(--radius-full); border:1px solid var(--color-bg-tertiary); background:var(--color-bg-primary); color:var(--color-text-secondary); font-size:var(--text-sm); font-weight:var(--weight-regular); font-family:var(--font-family-body); cursor:pointer; transition:opacity 120ms ease;">荤菜</button>
    <button style="flex-shrink:0; height:32px; padding:0 16px; border-radius:var(--radius-full); border:1px solid var(--color-bg-tertiary); background:var(--color-bg-primary); color:var(--color-text-secondary); font-size:var(--text-sm); font-weight:var(--weight-regular); font-family:var(--font-family-body); cursor:pointer; transition:opacity 120ms ease;">素菜</button>
    <button style="flex-shrink:0; height:32px; padding:0 16px; border-radius:var(--radius-full); border:1px solid var(--color-bg-tertiary); background:var(--color-bg-primary); color:var(--color-text-secondary); font-size:var(--text-sm); font-weight:var(--weight-regular); font-family:var(--font-family-body); cursor:pointer; transition:opacity 120ms ease;">汤品</button>
    <button style="flex-shrink:0; height:32px; padding:0 16px; border-radius:var(--radius-full); border:1px solid var(--color-bg-tertiary); background:var(--color-bg-primary); color:var(--color-text-secondary); font-size:var(--text-sm); font-weight:var(--weight-regular); font-family:var(--font-family-body); cursor:pointer; transition:opacity 120ms ease;">主食</button>
    <button style="flex-shrink:0; height:32px; padding:0 16px; border-radius:var(--radius-full); border:1px solid var(--color-bg-tertiary); background:var(--color-bg-primary); color:var(--color-text-secondary); font-size:var(--text-sm); font-weight:var(--weight-regular); font-family:var(--font-family-body); cursor:pointer; transition:opacity 120ms ease;">甜品</button>

  <!-- Dish Cards Grid -->
  <div style="padding:0 16px 16px; display:grid; grid-template-columns:repeat(2, 1fr); gap:12px;">

    <!-- Card 1: 红烧肉 -->

      <div style="aspect-ratio:1/1; overflow:hidden;">

          <button style="height:32px; padding:0 12px; border-radius:var(--radius-sm); border:1px solid var(--color-primary); background:var(--color-primary-subtle); color:var(--color-primary); font-size:var(--text-sm); font-weight:var(--weight-medium); font-family:var(--font-family-body); cursor:pointer; white-space:nowrap; transition:background-color 120ms ease;">加入</button>

        </svg>
      </div>
      <div style="padding:10px;">
        <div style="font-size:15px; font-weight:var(--weight-semibold); color:var(--color-text-primary); line-height:1.3; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">芒果布丁</div>
        <div style="font-size:13px; color:var(--color-text-secondary); line-height:1.4; margin-top:2px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">香甜嫩滑，饭后甜品</div>
        <div style="display:flex; align-items:center; justify-content:space-between; margin-top:8px;">
          <span style="font-size:17px; font-weight:var(--weight-bold); color:var(--color-primary); white-space:nowrap;">&#165;12</span>
          <button style="height:32px; padding:0 12px; border-radius:var(--radius-sm); border:1px solid var(--color-primary); background:var(--color-primary-subtle); color:var(--color-primary); font-size:var(--text-sm); font-weight:var(--weight-medium); font-family:var(--font-family-body); cursor:pointer; white-space:nowrap; transition:background-color 120ms ease;">加入</button>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- Floating Add Button -->
<div style="position:fixed; bottom:100px; right:16px; z-index:25;">
  <button data-dom-id="goto-add-dish" aria-label="新增菜品" style="display:flex; align-items:center; justify-content:center; width:50px; height:50px; border-radius:var(--radius-full); border:none; background:var(--color-primary); box-shadow:var(--shadow-lg); cursor:pointer; transition:transform 120ms ease, box-shadow 120ms ease;">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
  </button>
</div>

<!-- Bottom Tab Bar -->
<footer style="position:fixed; bottom:0; left:0; right:0; z-index:30; background:var(--color-bg-primary); border-top:1px solid var(--color-divider);">
  <div style="display:flex; align-items:center; justify-content:space-around; height:49px;">
    <!-- Tab 1: 菜单 (active) -->
    <button style="display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px; border:none; background:transparent; cursor:pointer; padding:4px 12px;">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--color-primary)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="7" height="7" rx="1"/>
        <rect x="14" y="3" width="7" height="7" rx="1"/>
        <rect x="3" y="14" width="7" height="7" rx="1"/>
        <rect x="14" y="14" width="7" height="7" rx="1"/>
      </svg>
      <span style="font-size:10px; font-weight:var(--weight-medium); color:var(--color-primary); line-height:1.2; font-family:var(--font-family-body);">菜单</span>
    </button>
    <!-- Tab 2: 购物车 -->
    <button style="display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px; border:none; background:transparent; cursor:pointer; padding:4px 12px;">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--color-text-tertiary)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="9" cy="21" r="1"/>
        <circle cx="20" cy="21" r="1"/>
        <path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6"/>
      </svg>
      <span style="font-size:10px; font-weight:var(--weight-regular); color:var(--color-text-tertiary); line-height:1.2; font-family:var(--font-family-body);">购物车</span>
    </button>
    <!-- Tab 3: 我的 -->
    <button style="display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px; border:none; background:transparent; cursor:pointer; padding:4px 12px;">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--color-text-tertiary)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
      <span style="font-size:10px; font-weight:var(--weight-regular); color:var(--color-text-tertiary); line-height:1.2; font-family:var(--font-family-body);">我的</span>
    </button>
  </div>
  <!-- Safe Area -->
  <div style="height:env(safe-area-inset-bottom, 34px); background:var(--color-bg-primary);"></div>
</footer>
